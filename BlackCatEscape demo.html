  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% -8%,#2c1e56 0%,var(--bg1) 42%,var(--bg0) 100%);
    color:var(--ink);min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:14px 12px 26px;overflow-x:hidden;user-select:none}
  .stars{position:fixed;inset:0;pointer-events:none;opacity:.5;z-index:0}
  .stars i{position:absolute;background:#cbb6ff;border-radius:1px;animation:tw 3.4s infinite}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}

  header{width:100%;max-width:360px;display:flex;align-items:center;gap:10px;z-index:1}
  .mark{width:40px;height:40px;border-radius:50%;flex:0 0 auto;background-image:var(--cat);background-size:cover;background-position:center;
    box-shadow:0 0 0 2px var(--gold),0 4px 12px rgba(0,0,0,.5)}
  .titles{flex:1;min-width:0}
  h1{font-size:15px;letter-spacing:.1em;margin:0;font-weight:800}
  .sub{font-size:11px;letter-spacing:.05em;color:var(--gold-soft);margin-top:2px}
  .icobtn{border:1px solid #4a3a75;background:#241a44;color:var(--dim);
    font:600 12px/1 "Trebuchet MS",sans-serif;padding:7px 9px;border-radius:9px;cursor:pointer}
  .icobtn b{color:var(--gold)}

  .hud{width:100%;max-width:360px;display:flex;justify-content:space-between;align-items:center;margin:14px 2px 8px;gap:8px;z-index:1}
  .stat{font-size:15px;letter-spacing:1px} .stat .off{filter:grayscale(1) brightness(.5);opacity:.45}
  .stat small{font-size:11px;color:var(--dim);margin-right:4px}
  .lvl{font-size:15px;color:var(--ink);font-weight:700} .lvl b{color:var(--gold);font-size:19px}
  .flagbtn{border:1px solid #4a3a75;background:#241a44;color:var(--ink);
    font:700 12px/1 "Trebuchet MS",sans-serif;padding:9px 12px;border-radius:10px;cursor:pointer}
  .flagbtn.on{background:var(--gold);color:#241400;border-color:var(--gold)}
  .flagbtn::before{content:"";display:inline-block;width:15px;height:15px;vertical-align:-3px;margin-right:5px;background:var(--paw) center/contain no-repeat}
  .hudright{display:flex;gap:8px;align-items:center}
  .rating{font-size:17px;letter-spacing:2px}
  .rating .on{color:var(--gold)} .rating .off{color:#5a4a86}
  .btn:disabled{opacity:.4;cursor:default}
  .cardstars{font-size:28px;letter-spacing:5px;margin:-4px 0 14px}
  .cardstars .on{color:var(--gold)} .cardstars .off{color:#5a4a86}
  .starmap{align-items:start}
  .starmap .panel{width:340px;max-width:94vw;margin:16px auto 30px}
  .stargrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
  .lvlcell{position:relative;background:linear-gradient(180deg,rgba(46,34,86,.6),rgba(28,20,54,.6));
    border:1px solid #3a2c5e;border-radius:10px;padding:7px 2px 6px;text-align:center}
  .lvlcell.unlocked{cursor:pointer} .lvlcell.unlocked:active{transform:translateY(1px)}
  .lvlcell.cur{border-color:var(--gold);box-shadow:0 0 10px rgba(242,179,61,.4)}
  .lvlcell.locked{opacity:.45}
  .lvlcell.hardclear{border-color:#d76a9a;box-shadow:0 0 8px rgba(215,106,154,.4)}
  .lvlcell .crown{position:absolute;top:-7px;right:-5px;font-size:13px;filter:drop-shadow(0 0 2px rgba(0,0,0,.7))}
  .lvlcell .ln{font-size:12px;font-weight:800;color:var(--ink)}
  .lvlcell .ls{font-size:9px;letter-spacing:1px;margin-top:2px;white-space:nowrap}
  .lvlcell .ls .on{color:var(--gold)} .lvlcell .ls .off{color:#5a4a86} .lvlcell .ls .lock{font-size:11px}
  .starnote{font-size:11.5px;line-height:1.55;color:var(--gold-soft);margin-top:8px}
  .startabs{display:flex;gap:8px;justify-content:center;margin-top:12px}
  .startabs .stab{flex:1;max-width:130px;border:1px solid #4a3a75;background:#231a42;color:var(--dim);
    font:700 12px/1 "Trebuchet MS",sans-serif;padding:10px;border-radius:10px;cursor:pointer}
  .startabs .stab.on{background:var(--gold);color:#241400;border-color:var(--gold)}
  .explain{width:100%;max-width:360px;margin-top:12px;z-index:1;display:none;
    font-size:12.5px;line-height:1.6;color:var(--ink);
    background:linear-gradient(180deg,rgba(46,34,86,.6),rgba(28,20,54,.6));
    border:1px solid var(--gold);border-radius:12px;padding:11px 14px}
  .explain.on{display:block;animation:fade .25s}
  .explain b{color:var(--gold-soft)}

  .stage{position:relative;z-index:1}
  .timerwrap{width:100%;max-width:360px;height:9px;border-radius:6px;background:#241a44;overflow:hidden;margin:0 0 8px;display:none;z-index:1;border:1px solid #3a2c5e}
  .timerwrap.on{display:block}
  .timerbar{height:100%;width:100%;background:linear-gradient(90deg,#67d98b,#f2b33d);transition:width .1s linear}
  .timerbar.low{background:linear-gradient(90deg,#f2b33d,#d76a9a)}
  .timerwrap.flash{animation:tflash .4s} @keyframes tflash{0%,100%{background:#241a44}50%{background:#d76a9a}}
  .board{position:relative;display:grid;gap:3px;padding:6px;border-radius:14px;
    background:linear-gradient(180deg,#0f0a20,#160f2c);border:1px solid #2c2150;
    box-shadow:inset 0 0 40px rgba(0,0,0,.55),0 10px 30px rgba(0,0,0,.5)}
  .cell{border-radius:6px;display:grid;place-items:center;font-weight:800;position:relative}
  .cell.hidden{background:linear-gradient(160deg,var(--hidden-a),var(--hidden-b));
    box-shadow:0 3px 0 #2a2046,inset 0 1px 0 rgba(255,255,255,.08);cursor:pointer}
  .cell.hidden:active{transform:translateY(1px);box-shadow:0 2px 0 #2a2046}
  .cell.rev{background:repeating-linear-gradient(45deg,#ece0c6 0 7px,#e2d3b2 7px 8px);
    box-shadow:inset 0 0 6px rgba(120,100,70,.35)}
  .cell.ghost{background:radial-gradient(circle at 50% 40%,#5a2140,#2a1030);box-shadow:inset 0 0 0 2px var(--ghost)}
  .cell.exit{background:radial-gradient(circle at 50% 42%,#6a3f12,#39230c);box-shadow:inset 0 0 0 2px var(--gold),0 0 12px rgba(242,179,61,.4)}
  .n1{color:#1e5fd0}.n2{color:#1f7a33}.n3{color:#cc2b2b}.n4{color:#6a1fb0}
  .n5{color:#9a3b12}.n6{color:#127a7a}.n7{color:#2a2440}.n8{color:#5a5a6a}
  .cell.hurt{animation:hurt .4s} @keyframes hurt{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .cell.flag::after{content:"";position:absolute;inset:0;background:var(--paw) center/60% no-repeat}
  .cell.hint{box-shadow:0 3px 0 #2a2046,inset 0 0 0 3px var(--gold),0 0 16px rgba(242,179,61,.75);animation:hintpulse .8s infinite}
  .cell.hintblue{box-shadow:0 3px 0 #2a2046,inset 0 0 0 3px #4aa3ff,0 0 14px rgba(74,163,255,.7)}
  .cell.hintred{box-shadow:0 3px 0 #2a2046,inset 0 0 0 3px #ff5a5a,0 0 14px rgba(255,90,90,.65)}
  .morebtn{margin-left:8px;border:1px solid var(--gold);background:transparent;color:var(--gold-soft);
    font:700 11px/1 "Trebuchet MS",sans-serif;padding:5px 9px;border-radius:8px;cursor:pointer;white-space:nowrap}
  @keyframes hintpulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}

  .cat{position:absolute;background-repeat:no-repeat;background-position:0 0;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.5));
    transition:left .18s ease,top .18s ease,opacity .15s ease;z-index:50;pointer-events:auto;cursor:pointer}
  .cat.peek{opacity:.15}

  .foot{width:100%;max-width:360px;margin-top:14px;display:flex;gap:10px;align-items:center;justify-content:center;z-index:1}
  .livesbar{width:100%;max-width:360px;margin-top:14px;z-index:1;display:flex;align-items:center;justify-content:center;
    gap:5px;font-size:22px;letter-spacing:2px;padding:9px 14px;border:1px solid #3a2c5e;border-radius:12px;
    background:linear-gradient(180deg,rgba(46,34,86,.55),rgba(28,20,54,.55))}
  .livesbar .lab{font-size:12px;color:var(--gold-soft);letter-spacing:.06em;margin-right:8px;font-weight:700}
  .livesbar .off{filter:grayscale(1) brightness(.5);opacity:.4}
  .catpip{display:inline-block;width:17px;height:17px;border-radius:50%;vertical-align:middle;
    background-image:var(--cat);background-size:cover;background-position:center;margin:0 1px;
    box-shadow:0 0 0 1px rgba(242,179,61,.6)}
  .catpip.off{filter:grayscale(1) brightness(.45);opacity:.4;box-shadow:none}
  .livesbar .catpip{width:24px;height:24px;margin:0 2px}
  .hint{flex:1;font-size:12px;line-height:1.5;color:var(--dim)} .hint b{color:var(--gold-soft)}
  .btn{border:1px solid #4a3a75;background:#241a44;color:var(--ink);
    font:700 12px/1 "Trebuchet MS",sans-serif;padding:11px 14px;border-radius:11px;cursor:pointer}
  .btn:active{transform:translateY(1px)}

  /* overlays */
  .screen{position:fixed;inset:0;display:none;place-items:center;z-index:6000;
    background:radial-gradient(120% 90% at 50% 0%,#2a1c54,#160f2c 70%,#0f0a20);overflow:auto}
  .screen.on{display:grid;animation:fade .35s}
  .over{position:fixed;inset:0;display:none;place-items:center;z-index:6500;background:rgba(10,6,22,.72);backdrop-filter:blur(3px)}
  .over.on{display:grid;animation:fade .3s}
  #ending{background:radial-gradient(120% 90% at 50% 30%,rgba(24,12,48,.92),rgba(6,4,14,.98))}
  #ending.on{animation:fade .55s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  .panel{width:300px;max-width:88vw;text-align:center;padding:26px 24px}
  .logo{width:118px;height:118px;border-radius:50%;margin:0 auto 6px;background-image:var(--cat);background-size:cover;
    box-shadow:0 0 0 3px var(--gold),0 0 34px rgba(242,179,61,.35),0 12px 30px rgba(0,0,0,.5);
    animation:float 4s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .game-title{font-size:23px;font-weight:900;letter-spacing:.08em;margin:8px 0 0;line-height:1.15;
    color:var(--gold);text-shadow:0 0 18px rgba(242,179,61,.4)}
  .game-sub{font-size:12px;letter-spacing:.34em;color:var(--gold-soft);font-weight:700;margin-top:6px}
  .tag{color:var(--gold-soft);font-size:12px;margin:12px 0 20px;line-height:1.65}
  .credit{margin-top:18px;font-size:11px;letter-spacing:.14em;color:var(--gold-soft);opacity:.85}
  .version{margin-top:5px;font-size:10px;letter-spacing:.18em;color:var(--dim);opacity:.75}
  .pagecredit{width:100%;max-width:360px;text-align:center;margin-top:16px;font-size:11px;
    letter-spacing:.12em;color:var(--gold-soft);opacity:.7;z-index:1}
  .menu{display:flex;flex-direction:column;gap:10px}
  .menu .big{background:var(--gold);color:#241400;border:none;font-size:15px;font-weight:800;padding:14px;border-radius:12px;cursor:pointer;letter-spacing:.04em}
  .menu .big:active{transform:translateY(1px)}
  .menu .ghostbtn{background:transparent;color:var(--ink);border:1px solid #5a4785;padding:11px;border-radius:12px;font-weight:700;cursor:pointer}
  .menu .ghostbtn.on{border-color:var(--gold);color:var(--gold-soft);box-shadow:0 0 12px rgba(242,179,61,.25)}
  .toprow{display:flex;justify-content:center;gap:8px;margin-top:14px}

  .how h2{font-size:17px;letter-spacing:.08em;margin:2px 0 12px;color:var(--gold)}
  .how ul{list-style:none;padding:0;margin:0 0 18px;text-align:left}
  .how li{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;line-height:1.5;color:var(--ink);margin-bottom:10px}
  .how li .ic{flex:0 0 24px;font-size:17px;text-align:center}
  .pawic{display:inline-block;width:18px;height:18px;background:var(--paw) center/contain no-repeat;vertical-align:-3px}
  .how li b{color:var(--gold-soft)}

  .card{background:linear-gradient(180deg,#241844,#1a1233);border:1px solid var(--gold);
    border-radius:18px;padding:24px 26px;text-align:center;width:280px;box-shadow:0 20px 50px rgba(0,0,0,.6)}
  .card .catbig{width:76px;height:76px;border-radius:50%;margin:0 auto 8px;background-image:var(--cat);background-size:cover;box-shadow:0 0 0 3px var(--gold)}
  .card.lose{border-color:var(--ghost)}.card.lose .catbig{box-shadow:0 0 0 3px var(--ghost)}
  .card h2{margin:6px 0 2px;letter-spacing:.1em;font-size:18px}
  .card p{margin:0 0 16px;color:var(--gold-soft);font-size:13px}.card.lose p{color:#f0a0c0}
  .card .row{display:flex;gap:8px}
  .card .btn{flex:1;background:var(--gold);color:#241400;border:none;font-size:14px;padding:13px}
  .card.lose .btn.primary{background:var(--ghost);color:#2a0018}
  .card .btn.sec{background:transparent;border:1px solid #5a4785;color:var(--ink)}
  .endcard{width:340px;max-width:92vw;text-align:center;animation:endin .7s cubic-bezier(.2,.8,.2,1) .5s both}
  @keyframes endin{from{opacity:0;transform:scale(.92) translateY(16px)}to{opacity:1;transform:none}}
  .endimg{width:100%;aspect-ratio:3/4;background-size:cover;background-position:center;border-radius:16px;
    border:2px solid var(--gold);box-shadow:0 20px 55px rgba(0,0,0,.65),0 0 30px rgba(242,179,61,.25)}
  .endcard .btn{margin-top:14px;width:100%;background:var(--gold);color:#241400;border:none;font-size:15px;font-weight:800;padding:14px}
</style>
</head>

<div class="stars" id="stars"></div>

<header>
  <div class="mark" id="mark"></div>

</header>

<div class="hud">
  <div class="lvl" id="lvl"></div>

<div class="livesbar" id="lives2"></div>
<div class="foot"><button class="btn" id="hintBtn"></button></div>
<div class="explain" id="explain"></div>

<!-- Title -->
<div class="screen on" id="title"><div class="panel">
  <div class="logo" id="logo"></div>
  <div class="game-title">BLACK CAT ESCAPE</div>
  <div class="game-sub">DEMO · 5 FREE STAGES</div>
  <div class="tag" id="ttag"></div>
  <div class="menu">
    <button class="big" id="startBtn">▶ はじめる</button>
    <button class="ghostbtn" id="restartBtn">最初から</button>

    <button class="icobtn" id="soundBtn"></button>

</div></div>

<!-- How to play -->
<div class="screen" id="howto"><div class="panel how">

</div></div>

<!-- Star records / level select -->

  <button class="big" id="starBack" style="width:100%;background:var(--gold);color:#241400;border:none;padding:13px;border-radius:12px;font-weight:800;cursor:pointer;margin-top:16px"></button>
</div></div>

<!-- Win/Lose -->
<div class="over" id="over"><div class="card" id="card">
  <div class="catbig" id="catbig"></div><h2 id="otitle"></h2><p id="osub"></p>

</div></div>

</div></div>

let lang='ja';
function starMarkup(n){let h='';for(let i=0;i<3;i++)h+=`<span class="${i<n?'on':'off'}">${i<n?'★':'☆'}</span>`;return h;}
function starsNow(){return Math.max(1,3-hintsUsed-(LIVES-lives));}
function drawStars(){const el=$('rating'); if(el)el.innerHTML=starMarkup(starsNow());}
function applyLang(){const t=T[lang];
  $('flag').textContent=flagMode?t.flagOn:t.flag; $('flag').classList.toggle('on',flagMode);
  $('home').textContent=t.toTitle;
  const _hr=MAX_HINTS-hintsUsed; $('hintBtn').textContent=`${t.hintBtn}${_hr>0?' ('+_hr+')':''}`; $('hintBtn').disabled=_hr<=0;
  $('hintBtn').style.display = hardMode ? 'none' : '';
  $('modeBtn').textContent = hardMode ? t.modeHard : t.modeNormal; $('modeBtn').classList.toggle('on',hardMode);
  $('ttag').innerHTML=t.tag;

function levelParams(L){

  const size=Math.min(7+Math.floor(tier/9),12);

let level=1, maxLevel=1, bestStars=[], hardStars=[], starMapMode='normal', W,H,MINES,START,EXIT,CELL;

function n8(r,c){const o=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
  if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nc>=0&&nr<H&&nc<W)o.push([nr,nc]);}return o;}

      if(nr>=0&&nc>=0&&nr<H&&nc<W&&!mine[nr][nc]&&!seen.has(nr+','+nc)){seen.add(nr+','+nc);q.push({r:nr,c:nc});}}}

    while(st.length){const[cr,cc]=st.pop();if(num[cr][cc]===0)for(const[nr,nc]of n8(cr,cc))

    for(let i=0;i<cons.length;i++)for(let j=0;j<cons.length;j++){ if(i===j)continue;

function gen(){
  const rnd=mulberry32((seedFor(level)^(hardMode?0x5bd1e995:0))>>>0);

    for(let i=cells.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[cells[i],cells[j]]=[cells[j],cells[i]];}
    const m=Math.min(MINES,cells.length);
    for(let i=0;i<m;i++){const[r,c]=cells[i];mine[r][c]=true;}
    if(!safePathExists())continue;

      if(!sub)continue;
      const diff=B.unk.filter(u=>!As.has(u[0]+','+u[1])); const nd=B.need-A.need;
      if(nd===0){ for(const[nr,nc]of diff){const k=K(nr,nc); if(!KS.has(k)){KS.set(k,{type:'sub',ka:A.k,kb:B.k,A:[A.r,A.c],B:[B.r,B.c]});changed=true;}} }
      else if(nd===diff.length){ for(const[nr,nc]of diff){const k=K(nr,nc); if(!KM.has(k)){KM.add(k);changed=true;}} }
    }
  }
  return {KS,KM};
}
function findHint(){
  const {KS}=deduceSafe();
  const reach=new Set([cat.r+','+cat.c]),q=[{...cat}];
  while(q.length){const{r,c}=q.pop();
    for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){const nr=r+dr,nc=c+dc;
      if(nr>=0&&nc>=0&&nr<H&&nc<W&&walkable(nr,nc)&&!reach.has(nr+','+nc)){reach.add(nr+','+nc);q.push({r:nr,c:nc});}}}
  const isFrontier=(r,c)=>{for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){const nr=r+dr,nc=c+dc;if(nr>=0&&nc>=0&&nr<H&&nc<W&&reach.has(nr+','+nc))return true;}return false;};
  let best=null;
  KS.forEach((reason,key)=>{const[r,c]=key.split(',').map(Number);
    if(revealed[r][c]||flagged[r][c]||mine[r][c])return;
    const score=(isFrontier(r,c)?0:1000)+Math.abs(EXIT.r-r)+Math.abs(EXIT.c-c);
    if(!best||score<best.score)best={r,c,reason,score};});
  if(best)return best;
  for(const key of reach){const[br,bc]=key.split(',').map(Number);
    for(const[dr,dc]of[[1,0],[-1,0],[0,1],[0,-1]]){const nr=br+dr,nc=bc+dc;
      if(nr>=0&&nc>=0&&nr<H&&nc<W&&!revealed[nr][nc]&&!flagged[nr][nc]&&!mine[nr][nc])return {r:nr,c:nc,reason:null};}}
  return null;
}
function hintReason(reason){
  const t=T[lang];
  if(reason&&reason.type==='sat')return t.reasonSat(reason.k);
  if(reason&&reason.type==='sub')return t.reasonSub(reason.ka,reason.kb);
  return t.reasonGeneric;
}
function hideHint(){ hintCell=null; currentHint=null; hintBlue.clear(); hintRed.clear(); clearTimeout(hintTimer); const e=$('explain'); if(e)e.classList.remove('on'); }
function showHintExplain(detail){
  const t=T[lang], e=$('explain'); if(!e||!currentHint)return;
  hintBlue.clear(); hintRed.clear();
  let txt;
  if(!detail){
    txt='💡 '+hintReason(currentHint.reason)+` <button class="morebtn" id="moreBtn">${t.more}</button>`;
  } else {
    const rs=currentHint.reason;
    if(rs&&rs.type==='sat'){
      hintBlue.add(rs.N[0]+','+rs.N[1]); (rs.mines||[]).forEach(m=>hintRed.add(m[0]+','+m[1]));
      txt='💡 '+t.detailSat(rs.k,(rs.mines||[]).length);
    } else if(rs&&rs.type==='sub'){
      hintBlue.add(rs.A[0]+','+rs.A[1]); hintBlue.add(rs.B[0]+','+rs.B[1]);
      txt='💡 '+t.detailSub(rs.ka,rs.kb);
    } else { txt='💡 '+t.reasonGeneric; }
  }
  e.innerHTML=txt; e.classList.add('on'); render();
  const mb=$('moreBtn'); if(mb)mb.onclick=()=>showHintExplain(true);
}
$('hintBtn').onclick=()=>{ if(busy||gameover||hardMode||hintsUsed>=MAX_HINTS)return; const h=findHint();
  if(h){ hintsUsed++; applyLang(); hintCell={r:h.r,c:h.c}; currentHint=h; sfx('tick'); showHintExplain(false); } };
$('again').onclick=()=>{ if(lastWin){ level = level>=DEMO_MAX ? 1 : level+1; saveProg(); loadLevel(false); } else { loadLevel(true); } };
window.addEventListener('resize',()=>{if(!W)return;fitCell();
  boardEl.style.gridTemplateColumns=`repeat(${W},${CELL}px)`;boardEl.style.gridAutoRows=CELL+'px';
  render();placeCat(cat,false);});

/* ---------- progress ---------- */
function saveProg(){try{localStorage.setItem('bce_demo',JSON.stringify({lv:level,max:maxLevel,muted,lang,stars:bestStars,hard:hardMode,hstars:hardStars}));}catch(e){}}
function loadProg(){try{const d=JSON.parse(localStorage.getItem('bce_demo'));if(d){level=Math.min(d.lv||1,DEMO_MAX);maxLevel=Math.min(d.max||1,DEMO_MAX);muted=!!d.muted;if(d.lang)lang=d.lang;if(Array.isArray(d.stars))bestStars=d.stars;hardMode=!!d.hard;
  if(Array.isArray(d.hstars))hardStars=d.hstars; else if(Array.isArray(d.hcl))d.hcl.forEach((v,i)=>{if(v)hardStars[i]=hardStars[i]||1;});}}catch(e){}}

/* ---------- audio (BGM + SFX, Web Audio) ---------- */
let actx,master,echo,MASTER=0.5,bgmStep=0,bgmNext=0,bgmTimer=null,_stepAlt=0;
const BPM=100, STEP=60/BPM/4;
const ROOTS=[45,41,48,43];
const CH=[[57,60,64],[53,57,60],[60,64,67],[55,59,62]];
const LEAD=[76,0,0,0, 74,0,72,0, 69,0,0,0, 72,0,0,0, 74,0,0,0, 76,0,79,0, 76,0,0,0, 72,0,0,0];
let noiseBuf=null;
function mfreq(m){return 440*Math.pow(2,(m-69)/12);}
function startAudio(){
  if(!actx){
    try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
    echo=actx.createDelay(); echo.delayTime.value=0.34;
    const fb=actx.createGain(); fb.gain.value=0.26; const wet=actx.createGain(); wet.gain.value=0.35;
    echo.connect(fb); fb.connect(echo); echo.connect(wet); wet.connect(master);
    window._echo=echo;
    noiseBuf=actx.createBuffer(1,actx.sampleRate*0.2,actx.sampleRate);
    const nd=noiseBuf.getChannelData(0); for(let i=0;i<nd.length;i++)nd[i]=Math.random()*2-1;
  }
  if(actx.state==='suspended') actx.resume();
  master.gain.cancelScheduledValues(actx.currentTime);
  master.gain.setValueAtTime(0.0001, actx.currentTime);
  master.gain.linearRampToValueAtTime(muted?0:MASTER, actx.currentTime+0.2);
  if(!bgmTimer){ bgmNext=actx.currentTime+0.1; bgmTimer=setInterval(bgmSched,25); }
}
function stopBgm(){
  if(bgmTimer){ clearInterval(bgmTimer); bgmTimer=null; }
  if(master&&actx){ master.gain.cancelScheduledValues(actx.currentTime);
    master.gain.setTargetAtTime(0, actx.currentTime, 0.12); }
}
function tone(freq,t,dur,type,vol,cutoff,send){
  const o=actx.createOscillator();o.type=type;o.frequency.setValueAtTime(freq,t);
  const g=actx.createGain();const f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=cutoff;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(f);f.connect(g);g.connect(master); if(send&&window._echo)g.connect(window._echo);
  o.start(t);o.stop(t+dur+0.03);
}
function kick(t){const o=actx.createOscillator();const g=actx.createGain();o.type='sine';
  o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(42,t+0.12);
  g.gain.setValueAtTime(0.14,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g);g.connect(master);o.start(t);o.stop(t+0.18);}
function hat(t,vol){if(!noiseBuf)return;const s=actx.createBufferSource();s.buffer=noiseBuf;
  const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=7000;const g=actx.createGain();
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
  s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+0.06);}
function bgmSched(){ if(!actx)return;
  while(bgmNext<actx.currentTime+0.12){ scheduleStep(bgmStep,bgmNext); bgmNext+=STEP; bgmStep=(bgmStep+1)%128; }
}
function scheduleStep(s,t){
  const bar=Math.floor(s/16),local=s%16,ci=Math.floor(bar/2)%4,chord=CH[ci],root=ROOTS[ci];
  if(s%2===0){ const n=chord[(s/2)%chord.length]+((Math.floor(s/8)%2)?12:0); tone(mfreq(n),t,STEP*1.6,'triangle',0.055,1700,true); }
  if(local===0||local===8){ tone(mfreq(root),t,STEP*7,'sine',0.12,700,false); }
  const ln=LEAD[s%32]; if(ln){ tone(mfreq(ln),t,STEP*2.4,'triangle',0.05,2600,true); }
  if(local===0||local===8) kick(t);
  if(local===4||local===12) hat(t,0.03); else if(local%2===0) hat(t,0.012);
}
function sfx(kind){ if(!actx||muted)return; const t=actx.currentTime;
  if(kind==='reveal') tone(880,t,0.08,'square',0.05,3000,false);
  else if(kind==='tick') tone(1320,t,0.05,'square',0.04,3000,false);
  else if(kind==='step'){ _stepAlt^=1; const f=_stepAlt?560:470;
    tone(f,t,0.08,'triangle',0.08,1500,false);
    if(noiseBuf){const s=actx.createBufferSource();s.buffer=noiseBuf;
      const bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=2200;
      const g=actx.createGain();g.gain.setValueAtTime(0.05,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.045);
      s.connect(bp);bp.connect(g);g.connect(master);s.start(t);s.stop(t+0.05);} }
  else if(kind==='start'){ [69,73,76,81].forEach((m,i)=>tone(mfreq(m),t+0.02+i*0.075,0.34,'triangle',0.12,3200,true));
    tone(mfreq(88),t+0.3,0.5,'sine',0.06,4200,true); }
  else if(kind==='ghost'){ tone(150,t,0.3,'sawtooth',0.14,900,false); tone(90,t+0.02,0.3,'square',0.1,700,false); }
  else if(kind==='win'){ [72,76,79,84].forEach((m,i)=>tone(mfreq(m),t+i*0.09,0.32,'triangle',0.11,3200,true)); }
  else if(kind==='lose'){ [67,63,60,55].forEach((m,i)=>tone(mfreq(m),t+i*0.1,0.3,'sawtooth',0.08,1600,false)); }
  else if(kind==='meow'){ meow(t); }
}
function meow(t){ if(!actx||muted)return;
  function voice(base,fmt,q,vol,dur){
    const o=actx.createOscillator(); o.type='sawtooth';
    const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=fmt; bp.Q.value=q;
    const g=actx.createGain();
    o.frequency.setValueAtTime(base*0.86,t);
    o.frequency.exponentialRampToValueAtTime(base*1.5,t+0.10);
    o.frequency.exponentialRampToValueAtTime(base*0.78,t+dur*0.9);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.05);
    g.gain.exponentialRampToValueAtTime(vol*0.7,t+dur*0.55);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(bp); bp.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.02);
  }
  voice(560,1100,7,0.16,0.5);
  voice(560,2500,9,0.06,0.46);
}

/* ---------- boot ---------- */
(function(){let h='';for(let i=0;i<26;i++){const s=(1+Math.random()*2).toFixed(1);
  h+=`<i style="left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;width:${s}px;height:${s}px;animation-delay:${(Math.random()*3).toFixed(1)}s"></i>`;}
  $('stars').innerHTML=h;})();
loadProg();
applyLang();
showTitle();
</script>
